
name: Test from sdist and wheels

on:
  push:
    branches: [ main ]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/dist-test.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/dist-test.yml"
  workflow_dispatch:
    inputs:
      allow_deploy:
        description: "Deploy to PyPI"
        required: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14
      - name: Build dists
        run: uv build
      - name: Export Lockfile
        run: uv export --frozen --only-group test --only-group doc --format requirements-txt -o requirements.txt
      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: 'dists'
          path: 'dist/*'
      - name: Upload requirements
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: 'requirements'
          path: 'requirements.txt'


  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        dist-type: ["wheel", "sdist"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Download requirements
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: 'requirements'
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: 'dists'
          path: dist
      - name: Install wheel
        run: pip install dist/*.whl
        if: matrix.dist-type == 'wheel'
      - name: Install sdist
        run: pip install dist/*.tar.gz
        if: matrix.dist-type == 'sdist'
      - name: Test built distribution
        run: py.test -n=0 tests/test_distribution.py

  deploy:
    needs: test
    if: ${{ success() && inputs.allow_deploy }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: 'dists'
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
