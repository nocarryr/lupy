name: CodSpeed

on:
  push:
    branches: [ "main" ]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/**"
      - ".github/workflows/codspeed.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/**"
      - ".github/workflows/codspeed.yml"
  workflow_dispatch:

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14
      - name: Install the Project
        run: uv sync --frozen --no-dev --group test
      - name: Run benchmarks
        uses: CodSpeedHQ/action@63f3e98b61959fe67f146a3ff022e4136fe9bb9c # v4
        with:
          run: uv run py.test tests/ --codspeed
          mode: simulation
